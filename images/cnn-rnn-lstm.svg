<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="purpleblue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="cnngrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="lstmgrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#30363d"/>
    </marker>
    <marker id="arrow-purple" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#7c3aed" opacity="0.6"/>
    </marker>
    <marker id="arrow-blue" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#3b82f6" opacity="0.6"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#0ea5e9" opacity="0.7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#0d1117"/>
  <!-- Faint grid -->
  <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
    <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#161b22" stroke-width="1"/>
  </pattern>
  <rect width="800" height="450" fill="url(#grid)"/>
  <!-- Glow blobs -->
  <ellipse cx="200" cy="180" rx="200" ry="150" fill="rgba(124,58,237,0.05)"/>
  <ellipse cx="600" cy="270" rx="220" ry="160" fill="rgba(59,130,246,0.05)"/>

  <!-- ── TITLE ── -->
  <text x="400" y="34" text-anchor="middle" font-size="11" font-weight="700" letter-spacing="3" fill="#a78bfa" opacity="0.8">CNN · RNN · LSTM — DEEP LEARNING ARCHITECTURES</text>

  <!-- ══════════════════════════════════════
       LEFT — CNN (LeNet)
  ══════════════════════════════════════ -->
  <text x="44" y="62" font-size="10" font-weight="700" letter-spacing="2" fill="#a78bfa">LeNet CNN</text>

  <!-- Input image — 5x5 pixel grid -->
  <rect x="30" y="70" width="50" height="50" rx="4" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <!-- Pixel grid shading to suggest image -->
  <rect x="32" y="72" width="8" height="8" fill="rgba(124,58,237,0.6)"/>
  <rect x="41" y="72" width="8" height="8" fill="rgba(124,58,237,0.3)"/>
  <rect x="50" y="72" width="8" height="8" fill="rgba(124,58,237,0.7)"/>
  <rect x="59" y="72" width="8" height="8" fill="rgba(124,58,237,0.2)"/>
  <rect x="68" y="72" width="8" height="8" fill="rgba(124,58,237,0.5)"/>
  <rect x="32" y="81" width="8" height="8" fill="rgba(124,58,237,0.2)"/>
  <rect x="41" y="81" width="8" height="8" fill="rgba(124,58,237,0.8)"/>
  <rect x="50" y="81" width="8" height="8" fill="rgba(124,58,237,0.4)"/>
  <rect x="59" y="81" width="8" height="8" fill="rgba(124,58,237,0.9)"/>
  <rect x="68" y="81" width="8" height="8" fill="rgba(124,58,237,0.3)"/>
  <rect x="32" y="90" width="8" height="8" fill="rgba(124,58,237,0.5)"/>
  <rect x="41" y="90" width="8" height="8" fill="rgba(124,58,237,0.3)"/>
  <rect x="50" y="90" width="8" height="8" fill="rgba(124,58,237,0.6)"/>
  <rect x="59" y="90" width="8" height="8" fill="rgba(124,58,237,0.2)"/>
  <rect x="68" y="90" width="8" height="8" fill="rgba(124,58,237,0.8)"/>
  <rect x="32" y="99" width="8" height="8" fill="rgba(124,58,237,0.7)"/>
  <rect x="41" y="99" width="8" height="8" fill="rgba(124,58,237,0.1)"/>
  <rect x="50" y="99" width="8" height="8" fill="rgba(124,58,237,0.5)"/>
  <rect x="59" y="99" width="8" height="8" fill="rgba(124,58,237,0.4)"/>
  <rect x="68" y="99" width="8" height="8" fill="rgba(124,58,237,0.6)"/>
  <rect x="32" y="108" width="8" height="8" fill="rgba(124,58,237,0.3)"/>
  <rect x="41" y="108" width="8" height="8" fill="rgba(124,58,237,0.7)"/>
  <rect x="50" y="108" width="8" height="8" fill="rgba(124,58,237,0.2)"/>
  <rect x="59" y="108" width="8" height="8" fill="rgba(124,58,237,0.9)"/>
  <rect x="68" y="108" width="8" height="8" fill="rgba(124,58,237,0.4)"/>
  <text x="55" y="132" text-anchor="middle" font-size="8" fill="#8b949e">Input</text>

  <!-- Arrow -->
  <line x1="84" y1="95" x2="96" y2="95" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Conv layer 1 — tall thin rectangles -->
  <rect x="98" y="72" width="14" height="46" rx="2" fill="rgba(124,58,237,0.7)" filter="url(#glow)"/>
  <rect x="114" y="76" width="14" height="38" rx="2" fill="rgba(124,58,237,0.55)"/>
  <rect x="130" y="80" width="14" height="30" rx="2" fill="rgba(124,58,237,0.4)"/>
  <text x="120" y="132" text-anchor="middle" font-size="8" fill="#8b949e">Conv1</text>

  <!-- Arrow -->
  <line x1="148" y1="95" x2="160" y2="95" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Pool layer 1 -->
  <rect x="162" y="78" width="12" height="34" rx="2" fill="rgba(99,102,241,0.6)"/>
  <rect x="176" y="82" width="12" height="26" rx="2" fill="rgba(99,102,241,0.45)"/>
  <text x="175" y="132" text-anchor="middle" font-size="8" fill="#8b949e">Pool1</text>

  <!-- Arrow -->
  <line x1="192" y1="95" x2="204" y2="95" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Conv layer 2 -->
  <rect x="206" y="74" width="10" height="42" rx="2" fill="rgba(79,70,229,0.8)"/>
  <rect x="218" y="77" width="10" height="36" rx="2" fill="rgba(79,70,229,0.65)"/>
  <rect x="230" y="80" width="10" height="30" rx="2" fill="rgba(79,70,229,0.5)"/>
  <rect x="242" y="83" width="10" height="24" rx="2" fill="rgba(79,70,229,0.35)"/>
  <text x="230" y="132" text-anchor="middle" font-size="8" fill="#8b949e">Conv2</text>

  <!-- Arrow -->
  <line x1="256" y1="95" x2="268" y2="95" stroke="#30363d" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- FC layers — vertical nodes -->
  <circle cx="278" cy="80" r="5" fill="#6366f1" filter="url(#glow)"/>
  <circle cx="278" cy="92" r="5" fill="#6366f1"/>
  <circle cx="278" cy="104" r="5" fill="#6366f1"/>
  <circle cx="278" cy="116" r="5" fill="#6366f1" opacity="0.7"/>
  <text x="278" y="132" text-anchor="middle" font-size="8" fill="#8b949e">FC</text>

  <!-- Connections FC to output -->
  <line x1="284" y1="80" x2="300" y2="86" stroke="#6366f1" stroke-width="0.8" opacity="0.4"/>
  <line x1="284" y1="92" x2="300" y2="86" stroke="#6366f1" stroke-width="0.8" opacity="0.4"/>
  <line x1="284" y1="80" x2="300" y2="98" stroke="#6366f1" stroke-width="0.8" opacity="0.4"/>
  <line x1="284" y1="104" x2="300" y2="98" stroke="#6366f1" stroke-width="0.8" opacity="0.4"/>
  <line x1="284" y1="116" x2="300" y2="110" stroke="#6366f1" stroke-width="0.8" opacity="0.4"/>
  <line x1="284" y1="104" x2="300" y2="110" stroke="#6366f1" stroke-width="0.8" opacity="0.4"/>

  <!-- Output nodes -->
  <circle cx="306" cy="86" r="6" fill="#a78bfa" filter="url(#glow)"/>
  <circle cx="306" cy="98" r="6" fill="#7c3aed"/>
  <circle cx="306" cy="110" r="6" fill="#6366f1" opacity="0.7"/>
  <text x="306" y="132" text-anchor="middle" font-size="8" fill="#8b949e">Out</text>

  <!-- Softmax label -->
  <rect x="290" y="138" width="52" height="13" rx="6" fill="rgba(124,58,237,0.15)" stroke="rgba(124,58,237,0.3)" stroke-width="1"/>
  <text x="316" y="148" text-anchor="middle" font-size="7.5" fill="#a78bfa">softmax</text>

  <!-- ── CNN formula ── -->
  <rect x="30" y="160" width="300" height="22" rx="6" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="180" y="175" text-anchor="middle" font-size="9" fill="#8b949e">f(x) = σ(W * x + b)   →   pool   →   flatten   →   FC</text>

  <!-- ══════════════════════════════════════
       MIDDLE — RNN
  ══════════════════════════════════════ -->
  <text x="400" y="62" text-anchor="middle" font-size="10" font-weight="700" letter-spacing="2" fill="#60a5fa">Recurrent Network</text>

  <!-- Unrolled RNN cells -->
  <!-- t-2 -->
  <rect x="340" y="72" width="52" height="52" rx="8" fill="#161b22" stroke="rgba(59,130,246,0.4)" stroke-width="1.5"/>
  <text x="366" y="93" text-anchor="middle" font-size="9" font-weight="700" fill="#60a5fa">h</text>
  <text x="366" y="106" text-anchor="middle" font-size="8" fill="#8b949e">t−2</text>
  <!-- input arrow up -->
  <line x1="366" y1="134" x2="366" y2="126" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arrow-blue)" opacity="0.6"/>
  <text x="366" y="143" text-anchor="middle" font-size="8" fill="#8b949e">x₁</text>

  <!-- t-1 -->
  <rect x="412" y="72" width="52" height="52" rx="8" fill="#161b22" stroke="rgba(59,130,246,0.5)" stroke-width="1.5"/>
  <text x="438" y="93" text-anchor="middle" font-size="9" font-weight="700" fill="#60a5fa">h</text>
  <text x="438" y="106" text-anchor="middle" font-size="8" fill="#8b949e">t−1</text>
  <line x1="438" y1="134" x2="438" y2="126" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arrow-blue)" opacity="0.6"/>
  <text x="438" y="143" text-anchor="middle" font-size="8" fill="#8b949e">x₂</text>

  <!-- t -->
  <rect x="484" y="72" width="52" height="52" rx="8" fill="#1e2d40" stroke="rgba(59,130,246,0.7)" stroke-width="1.5"/>
  <text x="510" y="93" text-anchor="middle" font-size="9" font-weight="700" fill="#60a5fa">h</text>
  <text x="510" y="106" text-anchor="middle" font-size="8" fill="#60a5fa">t</text>
  <line x1="510" y1="134" x2="510" y2="126" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arrow-blue)" opacity="0.6"/>
  <text x="510" y="143" text-anchor="middle" font-size="8" fill="#8b949e">x₃</text>

  <!-- Hidden state arrows between cells -->
  <line x1="393" y1="98" x2="410" y2="98" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)" opacity="0.7"/>
  <line x1="465" y1="98" x2="482" y2="98" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)" opacity="0.7"/>
  <!-- h_t label -->
  <text x="401" y="94" font-size="7.5" fill="#60a5fa" opacity="0.7">hₜ</text>
  <text x="473" y="94" font-size="7.5" fill="#60a5fa" opacity="0.7">hₜ</text>

  <!-- Ellipsis before -->
  <text x="336" y="101" text-anchor="end" font-size="14" fill="#30363d">···</text>
  <!-- Output arrow from h_t -->
  <line x1="510" y1="70" x2="510" y2="58" stroke="#60a5fa" stroke-width="1.2" opacity="0.6"/>
  <text x="510" y="54" text-anchor="middle" font-size="8" fill="#60a5fa">ŷₜ</text>

  <!-- Vanishing gradient note -->
  <rect x="336" y="152" width="202" height="30" rx="6" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <text x="344" y="165" font-size="8" fill="#8b949e">hₜ = tanh(Wₕhₜ₋₁ + Wₓxₜ + b)</text>
  <text x="344" y="177" font-size="7.5" fill="#ef4444" opacity="0.7">⚠ vanishing gradient over long seqs</text>

  <!-- ══════════════════════════════════════
       RIGHT — LSTM cell
  ══════════════════════════════════════ -->
  <text x="680" y="62" text-anchor="middle" font-size="10" font-weight="700" letter-spacing="2" fill="#0ea5e9">LSTM Cell</text>

  <!-- Cell body -->
  <rect x="570" y="68" width="220" height="120" rx="10" fill="#161b22" stroke="rgba(14,165,233,0.35)" stroke-width="1.5"/>

  <!-- Cell state line (top) -->
  <line x1="570" y1="98" x2="790" y2="98" stroke="#0ea5e9" stroke-width="2" opacity="0.5" stroke-dasharray="4,3"/>
  <text x="578" y="93" font-size="8" fill="#0ea5e9" opacity="0.8">cₜ  (cell state)</text>

  <!-- Forget gate -->
  <rect x="590" y="108" width="28" height="28" rx="14" fill="#0d1117" stroke="rgba(239,68,68,0.5)" stroke-width="1.5"/>
  <text x="604" y="126" text-anchor="middle" font-size="11" font-weight="700" fill="#f87171">f</text>
  <text x="604" y="148" text-anchor="middle" font-size="7.5" fill="#8b949e">forget</text>
  <line x1="604" y1="136" x2="604" y2="98" stroke="#f87171" stroke-width="1" opacity="0.5" marker-end="url(#arrow)"/>

  <!-- Input gate -->
  <rect x="648" y="108" width="28" height="28" rx="14" fill="#0d1117" stroke="rgba(16,185,129,0.5)" stroke-width="1.5"/>
  <text x="662" y="126" text-anchor="middle" font-size="11" font-weight="700" fill="#34d399">i</text>
  <text x="662" y="148" text-anchor="middle" font-size="7.5" fill="#8b949e">input</text>
  <line x1="662" y1="136" x2="662" y2="98" stroke="#34d399" stroke-width="1" opacity="0.5" marker-end="url(#arrow)"/>

  <!-- Cell gate (g) -->
  <rect x="706" y="108" width="28" height="28" rx="6" fill="#0d1117" stroke="rgba(14,165,233,0.5)" stroke-width="1.5"/>
  <text x="720" y="126" text-anchor="middle" font-size="11" font-weight="700" fill="#38bdf8">g</text>
  <text x="720" y="148" text-anchor="middle" font-size="7.5" fill="#8b949e">cell</text>
  <line x1="720" y1="136" x2="720" y2="98" stroke="#38bdf8" stroke-width="1" opacity="0.5" marker-end="url(#arrow)"/>

  <!-- Output gate -->
  <rect x="762" y="108" width="12" height="28" rx="6" fill="#0d1117" stroke="rgba(167,139,250,0.5)" stroke-width="1.5"/>
  <text x="768" y="126" text-anchor="middle" font-size="9" font-weight="700" fill="#a78bfa">o</text>
  <text x="768" y="148" text-anchor="middle" font-size="7.5" fill="#8b949e">out</text>

  <!-- hₜ₋₁ input arrow -->
  <line x1="570" y1="155" x2="590" y2="155" stroke="#0ea5e9" stroke-width="1.5" marker-end="url(#arrow-cyan)" opacity="0.6"/>
  <text x="562" y="158" text-anchor="end" font-size="8" fill="#8b949e">hₜ₋₁</text>

  <!-- xₜ input arrow -->
  <line x1="640" y1="188" x2="640" y2="168" stroke="#0ea5e9" stroke-width="1.5" marker-end="url(#arrow-cyan)" opacity="0.6"/>
  <text x="640" y="196" text-anchor="middle" font-size="8" fill="#8b949e">xₜ</text>

  <!-- hₜ output arrow -->
  <line x1="780" y1="155" x2="796" y2="155" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.7"/>
  <text x="798" y="158" font-size="8" fill="#a78bfa">hₜ</text>

  <!-- LSTM equations panel -->
  <rect x="570" y="200" width="220" height="82" rx="8" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <text x="582" y="216" font-size="8.5" fill="#f87171">fₜ = σ(Wf·[hₜ₋₁, xₜ] + bf)</text>
  <text x="582" y="229" font-size="8.5" fill="#34d399">iₜ = σ(Wi·[hₜ₋₁, xₜ] + bi)</text>
  <text x="582" y="242" font-size="8.5" fill="#38bdf8">c̃ₜ = tanh(Wc·[hₜ₋₁, xₜ] + bc)</text>
  <text x="582" y="255" font-size="8.5" fill="#0ea5e9">cₜ = fₜ⊙cₜ₋₁ + iₜ⊙c̃ₜ</text>
  <text x="582" y="268" font-size="8.5" fill="#a78bfa">hₜ = oₜ⊙tanh(cₜ)</text>

  <!-- ══════════════════════════════════════
       BOTTOM — PyTorch training strip
  ══════════════════════════════════════ -->
  <rect x="30" y="298" width="740" height="118" rx="10" fill="#161b22" stroke="#21262d" stroke-width="1.5"/>

  <!-- Section label -->
  <text x="50" y="320" font-size="9" font-weight="700" letter-spacing="2" fill="#8b949e">TRAINING · PyTorch</text>
  <rect x="560" y="308" width="60" height="16" rx="8" fill="rgba(234,179,8,0.12)" stroke="rgba(234,179,8,0.3)" stroke-width="1"/>
  <text x="590" y="320" text-anchor="middle" font-size="8" font-weight="600" fill="#fbbf24">Image Clf</text>
  <rect x="626" y="308" width="60" height="16" rx="8" fill="rgba(16,185,129,0.12)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
  <text x="656" y="320" text-anchor="middle" font-size="8" font-weight="600" fill="#34d399">Seq2Seq</text>
  <rect x="692" y="308" width="68" height="16" rx="8" fill="rgba(14,165,233,0.12)" stroke="rgba(14,165,233,0.3)" stroke-width="1"/>
  <text x="726" y="320" text-anchor="middle" font-size="8" font-weight="600" fill="#38bdf8">Translation</text>

  <!-- Loss curve -->
  <text x="50" y="342" font-size="8" fill="#8b949e">Loss</text>
  <!-- Axes -->
  <line x1="66" y1="330" x2="66" y2="395" stroke="#30363d" stroke-width="1"/>
  <line x1="66" y1="395" x2="380" y2="395" stroke="#30363d" stroke-width="1"/>
  <text x="380" y="404" text-anchor="end" font-size="8" fill="#8b949e">Epoch</text>
  <!-- Training loss curve -->
  <polyline points="68,360 90,348 115,338 145,330 180,325 220,322 265,320 310,319 360,318" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Val loss curve -->
  <polyline points="68,365 90,354 115,346 145,340 180,337 220,336 265,338 310,341 360,344" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="5,3"/>
  <!-- Legend -->
  <line x1="72" y1="408" x2="88" y2="408" stroke="#a78bfa" stroke-width="2"/>
  <text x="92" y="411" font-size="8" fill="#8b949e">Train</text>
  <line x1="120" y1="408" x2="136" y2="408" stroke="#60a5fa" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="140" y="411" font-size="8" fill="#8b949e">Val</text>

  <!-- Accuracy bars -->
  <text x="415" y="342" font-size="8" fill="#8b949e">Accuracy</text>
  <!-- Bar chart -->
  <rect x="415" y="395" width="50" height="0" rx="0"/>
  <rect x="415" y="356" width="50" height="39" rx="3" fill="rgba(124,58,237,0.15)" stroke="#21262d" stroke-width="1"/>
  <rect x="415" y="370" width="50" height="25" rx="3" fill="rgba(124,58,237,0.6)"/>
  <text x="440" y="367" text-anchor="middle" font-size="8" font-weight="700" fill="#a78bfa">82%</text>
  <text x="440" y="404" text-anchor="middle" font-size="7.5" fill="#8b949e">CNN</text>

  <rect x="472" y="356" width="50" height="39" rx="3" fill="rgba(59,130,246,0.15)" stroke="#21262d" stroke-width="1"/>
  <rect x="472" y="362" width="50" height="33" rx="3" fill="rgba(59,130,246,0.6)"/>
  <text x="497" y="360" text-anchor="middle" font-size="8" font-weight="700" fill="#60a5fa">88%</text>
  <text x="497" y="404" text-anchor="middle" font-size="7.5" fill="#8b949e">RNN</text>

  <rect x="530" y="356" width="50" height="39" rx="3" fill="rgba(14,165,233,0.15)" stroke="#21262d" stroke-width="1"/>
  <rect x="530" y="358" width="50" height="37" rx="3" fill="rgba(14,165,233,0.6)"/>
  <text x="555" y="356" text-anchor="middle" font-size="8" font-weight="700" fill="#38bdf8">94%</text>

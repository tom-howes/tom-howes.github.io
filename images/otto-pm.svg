<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#faf5ff"/>
      <stop offset="100%" stop-color="#eff6ff"/>
    </linearGradient>
    <linearGradient id="purplegrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="bluegrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="progressgrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="cardshadow" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(109,40,217,0.10)"/>
    </filter>
    <filter id="softshadow" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="rgba(0,0,0,0.08)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Subtle dot grid -->
  <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="rgba(109,40,217,0.07)"/>
  </pattern>
  <rect width="800" height="450" fill="url(#dots)"/>
  <!-- Glow blobs -->
  <ellipse cx="160" cy="150" rx="160" ry="120" fill="rgba(167,139,250,0.12)"/>
  <ellipse cx="640" cy="300" rx="180" ry="130" fill="rgba(99,102,241,0.08)"/>

  <!-- ══════════════════════════════
       TOP BAR / APP CHROME
  ══════════════════════════════ -->
  <rect x="60" y="30" width="680" height="44" rx="12" fill="white" filter="url(#softshadow)"/>
  <!-- Traffic lights -->
  <circle cx="84" cy="52" r="6" fill="#fc5c65"/>
  <circle cx="102" cy="52" r="6" fill="#ffce54"/>
  <circle cx="120" cy="52" r="6" fill="#26de81"/>
  <!-- Logo -->
  <rect x="148" y="40" width="26" height="26" rx="8" fill="url(#purplegrad)"/>
  <text x="161" y="58" text-anchor="middle" font-size="13" font-weight="800" fill="white">O</text>
  <text x="182" y="57" font-size="13" font-weight="800" fill="#1e1b4b">Otto</text>
  <text x="210" y="57" font-size="12" fill="#a78bfa">PM</text>
  <!-- Nav items -->
  <text x="290" y="57" font-size="11" fill="#6b7280">Dashboard</text>
  <text x="370" y="57" font-size="11" fill="#6b7280">Sprints</text>
  <text x="434" y="57" font-size="11" fill="#6b7280">Backlog</text>
  <rect x="496" y="43" width="52" height="18" rx="9" fill="rgba(124,58,237,0.1)"/>
  <text x="522" y="56" text-anchor="middle" font-size="10" font-weight="600" fill="#7c3aed">AI Chat</text>
  <!-- Avatar -->
  <circle cx="712" cy="52" r="14" fill="url(#bluegrad)"/>
  <text x="712" y="56" text-anchor="middle" font-size="10" font-weight="700" fill="white">TH</text>

  <!-- ══════════════════════════════
       LEFT PANEL — SPRINT BOARD
  ══════════════════════════════ -->
  <rect x="60" y="90" width="310" height="322" rx="12" fill="white" filter="url(#cardshadow)"/>
  <text x="80" y="116" font-size="13" font-weight="700" fill="#1e1b4b">Sprint 12  </text>
  <rect x="160" y="103" width="52" height="18" rx="9" fill="rgba(16,185,129,0.12)"/>
  <text x="186" y="115" text-anchor="middle" font-size="9" font-weight="700" fill="#059669">ACTIVE</text>
  <text x="340" y="116" text-anchor="end" font-size="10" fill="#9ca3af">8 days left</text>

  <!-- Progress bar -->
  <rect x="80" y="124" width="270" height="6" rx="3" fill="#f3f4f6"/>
  <rect x="80" y="124" width="162" height="6" rx="3" fill="url(#progressgrad)"/>
  <text x="80" y="142" font-size="8.5" fill="#9ca3af">60% complete</text>
  <text x="350" y="142" text-anchor="end" font-size="8.5" fill="#6366f1">18 / 30 pts</text>

  <!-- Column headers -->
  <text x="80" y="163" font-size="9" font-weight="700" fill="#9ca3af" letter-spacing="1">TODO</text>
  <text x="196" y="163" font-size="9" font-weight="700" fill="#9ca3af" letter-spacing="1">IN PROGRESS</text>
  <text x="310" y="163" text-anchor="end" font-size="9" font-weight="700" fill="#9ca3af" letter-spacing="1">DONE</text>

  <!-- Divider -->
  <line x1="80" y1="168" x2="350" y2="168" stroke="#f3f4f6" stroke-width="1.5"/>

  <!-- TODO tickets -->
  <rect x="80" y="174" width="90" height="46" rx="7" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="80" y="174" width="90" height="4" rx="7" fill="#a78bfa"/>
  <text x="88" y="190" font-size="8" fill="#6b7280">AUTH-104</text>
  <text x="88" y="202" font-size="8.5" font-weight="600" fill="#1e1b4b">OAuth token</text>
  <text x="88" y="213" font-size="8.5" font-weight="600" fill="#1e1b4b">refresh</text>

  <rect x="80" y="226" width="90" height="46" rx="7" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="80" y="226" width="90" height="4" rx="7" fill="#60a5fa"/>
  <text x="88" y="242" font-size="8" fill="#6b7280">UI-88</text>
  <text x="88" y="254" font-size="8.5" font-weight="600" fill="#1e1b4b">Dark mode</text>
  <text x="88" y="265" font-size="8.5" font-weight="600" fill="#1e1b4b">toggle</text>

  <rect x="80" y="278" width="90" height="46" rx="7" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="80" y="278" width="90" height="4" rx="7" fill="#fb923c"/>
  <text x="88" y="294" font-size="8" fill="#6b7280">INFRA-21</text>
  <text x="88" y="306" font-size="8.5" font-weight="600" fill="#1e1b4b">Airflow DAG</text>
  <text x="88" y="317" font-size="8.5" font-weight="600" fill="#1e1b4b">scheduling</text>

  <!-- IN PROGRESS tickets -->
  <rect x="182" y="174" width="90" height="46" rx="7" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="182" y="174" width="90" height="4" rx="7" fill="#f59e0b"/>
  <text x="190" y="190" font-size="8" fill="#6b7280">API-55</text>
  <text x="190" y="202" font-size="8.5" font-weight="600" fill="#1e1b4b">GCP pipeline</text>
  <text x="190" y="213" font-size="8.5" font-weight="600" fill="#1e1b4b">integration</text>
  <!-- In-progress indicator -->
  <rect x="190" y="217" width="64" height="3" rx="1.5" fill="#fef3c7"/>
  <rect x="190" y="217" width="44" height="3" rx="1.5" fill="#f59e0b" opacity="0.9"/>

  <rect x="182" y="226" width="90" height="46" rx="7" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="182" y="226" width="90" height="4" rx="7" fill="#7c3aed"/>
  <text x="190" y="242" font-size="8" fill="#6b7280">ML-30</text>
  <text x="190" y="254" font-size="8.5" font-weight="600" fill="#1e1b4b">LLM prompt</text>
  <text x="190" y="265" font-size="8.5" font-weight="600" fill="#1e1b4b">tuning</text>
  <rect x="190" y="269" width="64" height="3" rx="1.5" fill="#ede9fe"/>
  <rect x="190" y="269" width="22" height="3" rx="1.5" fill="#7c3aed" opacity="0.9"/>

  <!-- DONE tickets -->
  <rect x="284" y="174" width="56" height="46" rx="7" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="292" y="190" font-size="8" fill="#6b7280">BE-12</text>
  <text x="292" y="202" font-size="8.5" font-weight="600" fill="#1e1b4b">Auth</text>
  <text x="292" y="213" font-size="8.5" font-weight="600" fill="#1e1b4b">service</text>
  <circle cx="327" cy="211" r="7" fill="#dcfce7"/>
  <polyline points="323,211 326,214 332,207" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="284" y="226" width="56" height="46" rx="7" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="292" y="242" font-size="8" fill="#6b7280">FE-44</text>
  <text x="292" y="254" font-size="8.5" font-weight="600" fill="#1e1b4b">Login</text>
  <text x="292" y="265" font-size="8.5" font-weight="600" fill="#1e1b4b">redesign</text>
  <circle cx="327" cy="263" r="7" fill="#dcfce7"/>
  <polyline points="323,263 326,266 332,259" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="284" y="278" width="56" height="46" rx="7" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="292" y="294" font-size="8" fill="#6b7280">DS-7</text>
  <text x="292" y="306" font-size="8.5" font-weight="600" fill="#1e1b4b">Data</text>
  <text x="292" y="317" font-size="8.5" font-weight="600" fill="#1e1b4b">schema</text>
  <circle cx="327" cy="315" r="7" fill="#dcfce7"/>
  <polyline points="323,315 326,318 332,311" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Otto AI bar at bottom of left panel -->
  <rect x="70" y="346" width="290" height="56" rx="8" fill="rgba(124,58,237,0.05)" stroke="rgba(124,58,237,0.15)" stroke-width="1"/>
  <rect x="78" y="354" width="26" height="26" rx="8" fill="url(#purplegrad)"/>
  <text x="91" y="371" text-anchor="middle" font-size="12" font-weight="800" fill="white">O</text>
  <text x="112" y="362" font-size="9" font-weight="700" fill="#7c3aed">Otto suggests</text>
  <text x="112" y="375" font-size="8.5" fill="#6b7280">API-55 may miss sprint — consider</text>
  <text x="112" y="387" font-size="8.5" fill="#6b7280">splitting into 2 tickets.</text>

  <!-- ══════════════════════════════
       RIGHT PANEL — AI CHAT
  ══════════════════════════════ -->
  <rect x="388" y="90" width="352" height="322" rx="12" fill="white" filter="url(#cardshadow)"/>

  <!-- Chat header -->
  <rect x="388" y="90" width="352" height="44" rx="12" fill="url(#purplegrad)"/>
  <rect x="388" y="116" width="352" height="18" fill="url(#purplegrad)"/>
  <rect x="406" y="102" width="26" height="26" rx="8" fill="rgba(255,255,255,0.2)"/>
  <text x="419" y="120" text-anchor="middle" font-size="13" font-weight="800" fill="white">O</text>
  <text x="440" y="120" font-size="12" font-weight="700" fill="white">Ask Otto</text>
  <rect x="680" y="103" width="48" height="18" rx="9" fill="rgba(255,255,255,0.2)"/>
  <circle cx="692" cy="112" r="4" fill="#26de81"/>
  <text x="706" y="116" font-size="9" fill="white">Live</text>

  <!-- User message 1 -->
  <rect x="476" y="148" width="246" height="34" rx="10" fill="#ede9fe"/>
  <text x="496" y="163" font-size="9.5" fill="#1e1b4b">What's blocking us this sprint?</text>
  <text x="714" y="176" text-anchor="end" font-size="8" fill="#a78bfa">You · 2m ago</text>

  <!-- Otto reply 1 -->
  <rect x="404" y="192" width="276" height="64" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="404" y="192" width="276" height="64" rx="10" fill="white"/>
  <circle cx="418" cy="206" r="10" fill="url(#purplegrad)"/>
  <text x="418" y="210" text-anchor="middle" font-size="9" font-weight="800" fill="white">O</text>
  <text x="434" y="206" font-size="9" font-weight="700" fill="#7c3aed">Otto</text>
  <text x="434" y="220" font-size="9" fill="#374151">I found <tspan font-weight="700" fill="#dc2626">2 blockers</tspan> in Sprint 12:</text>
  <text x="412" y="236" font-size="9" fill="#374151">• API-55: GCP dependency unresolved</text>
  <text x="412" y="249" font-size="9" fill="#374151">• ML-30: Waiting on model eval results</text>

  <!-- User message 2 -->
  <rect x="476" y="268" width="246" height="34" rx="10" fill="#ede9fe"/>
  <text x="496" y="283" font-size="9.5" fill="#1e1b4b">Draft a summary for standup</text>
  <text x="714" y="296" text-anchor="end" font-size="8" fill="#a78bfa">You · just now</text>

  <!-- Otto reply 2 — streaming -->
  <rect x="404" y="310" width="328" height="88" rx="10" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <circle cx="418" cy="324" r="10" fill="url(#purplegrad)"/>
  <text x="418" y="328" text-anchor="middle" font-size="9" font-weight="800" fill="white">O</text>
  <text x="434" y="324" font-size="9" font-weight="700" fill="#7c3aed">Otto</text>
  <!-- Streaming badge -->
  <rect x="458" y="315" width="52" height="14" rx="7" fill="rgba(124,58,237,0.1)"/>
  <circle cx="468" cy="322" r="3" fill="#7c3aed" opacity="0.6"/>
  <text x="476" y="326" font-size="7.5" fill="#7c3aed">writing...</text>
  <text x="412" y="340" font-size="9" fill="#374151" font-weight="600">Sprint 12 Standup — Day 14</text>
  <text x="412" y="354" font-size="9" fill="#374151">✓ 60% complete · 2 blockers flagged</text>
  <text x="412" y="366" font-size="9" fill="#374151">↑ Velocity +18% vs Sprint 11</text>
  <text x="412" y="378" font-size="9" fill="#9ca3af">⚡ Powered by GCP · Airflow · LLMs</text>
  <!-- Cursor -->
  <rect x="412" y="382" width="2" height="10" rx="1" fill="#7c3aed" opacity="0.8"/>

  <!-- Input box -->
  <rect x="396" y="404" width="336" height="0" rx="0" fill="none"/>
</svg>
